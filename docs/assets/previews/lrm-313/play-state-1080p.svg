<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="LRM-313 play state 1080p with v2 cards">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#33221a"/>
      <stop offset="48%" stop-color="#43301f"/>
      <stop offset="100%" stop-color="#241612"/>
    </linearGradient>
    <radialGradient id="felt" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#2a6349"/>
      <stop offset="68%" stop-color="#1b4a37"/>
      <stop offset="100%" stop-color="#0b2218"/>
    </radialGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffcf7"/>
      <stop offset="100%" stop-color="#f0ebe0"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity=".3"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#room)"/>
  <text x="48" y="48" fill="#e8bc3a" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">LRM-313 Play State 1920x1080  v2 cards in hand (LRM-246/250 safe)</text>
  <!-- topnav -->
  <rect x="40" y="64" width="1840" height="44" rx="8" fill="rgba(11,34,24,0.9)"/>
  <text x="60" y="92" fill="#fff3c4" font-size="14" font-family="Segoe UI">0;  ? #8821</text>
  <!-- table -->
  <ellipse cx="960" cy="500" rx="680" ry="300" fill="url(#felt)" stroke="#6b4424" stroke-width="18"/>
  <ellipse cx="960" cy="500" rx="668" ry="288" fill="none" stroke="#8a5c34" stroke-width="3"/>
  <!-- opponent -->
  <rect x="820" y="220" width="280" height="64" rx="10" fill="rgba(0,0,0,0.28)" stroke="rgba(255,255,255,0.1)"/>
  <text x="900" y="258" fill="#fff3c4" font-size="14" font-family="Segoe UI">
  i 12  </text>
  <!-- play zone -->
  <rect x="700" y="420" width="520" height="120" rx="12" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.08)"/>
  <g transform="translate(820,450)">
    <rect width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355" filter="url(#sh)"/>
    <text x="12" y="26" font-size="18" font-weight="800" fill="#d32f2f" font-family="Georgia">Q</text>
    <rect x="36" y="0" width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355" filter="url(#sh)"/>
    <text x="48" y="26" font-size="18" font-weight="800" fill="#d32f2f" font-family="Georgia">Q</text>
    <rect x="72" y="0" width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355" filter="url(#sh)"/>
    <text x="84" y="26" font-size="18" font-weight="800" fill="#1a1a1a" font-family="Georgia">K</text>
  </g>
  <!-- hand v2 cards -->
  <g transform="translate(520,780)">
    <g transform="translate(0,0)"><rect width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355" filter="url(#sh)"/><text x="12" y="26" font-size="18" font-weight="800" fill="#1a1a1a" font-family="Georgia">3</text></g>
    <g transform="translate(28,-6)"><rect width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355" filter="url(#sh)"/><text x="12" y="26" font-size="18" font-weight="800" fill="#d32f2f" font-family="Georgia">5</text></g>
    <g transform="translate(56,-34)"><rect width="52" height="74" rx="8" fill="url(#paper)" stroke="#f6c65b" stroke-width="2.5" filter="url(#sh)"/><text x="12" y="26" font-size="18" font-weight="800" fill="#d32f2f" font-family="Georgia">A</text></g>
    <g transform="translate(84,-6)"><rect width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355" filter="url(#sh)"/><text x="12" y="26" font-size="18" font-weight="800" fill="#1a1a1a" font-family="Georgia">7</text></g>
    <g transform="translate(112,0)"><rect width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355" filter="url(#sh)"/><text x="12" y="26" font-size="18" font-weight="800" fill="#1a1a1a" font-family="Georgia">8</text></g>
    <g transform="translate(140,0)"><rect width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355" filter="url(#sh)"/><text x="12" y="26" font-size="18" font-weight="800" fill="#d32f2f" font-family="Georgia">9</text></g>
    <g transform="translate(168,0)"><rect width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355" filter="url(#sh)"/><text x="12" y="26" font-size="18" font-weight="800" fill="#1a1a1a" font-family="Georgia">J</text></g>
    <g transform="translate(196,0)"><rect width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355" filter="url(#sh)"/><text x="12" y="26" font-size="18" font-weight="800" fill="#1a1a1a" font-family="Georgia">K</text></g>
    <g transform="translate(224,0)"><rect width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355" filter="url(#sh)"/><text x="8" y="22" font-size="11" font-weight="900" fill="#b71c1c" font-family="Segoe UI">'</text></g>
    <g transform="translate(252,0)"><rect width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355" filter="url(#sh)"/><text x="8" y="22" font-size="11" font-weight="900" fill="#1a2433" font-family="Segoe UI"></text></g>
    <g transform="translate(280,0)" opacity="0.55"><rect width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355"/><text x="12" y="26" font-size="18" font-weight="800" fill="#1a1a1a" font-family="Georgia">2</text></g>
    <g transform="translate(308,0)" opacity="0.55"><rect width="52" height="74" rx="8" fill="url(#paper)" stroke="#8a7355"/><text x="12" y="26" font-size="18" font-weight="800" fill="#d32f2f" font-family="Georgia">4</text></g>
  </g>
  <!-- controls -->
  <rect x="660" y="920" width="600" height="52" rx="12" fill="#e8bc3a"/>
  <text x="960" y="952" text-anchor="middle" fill="#2c1d00" font-size="16" font-weight="700" font-family="Segoe UI">L</text>
  <text x="48" y="1040" fill="#7ef0a8" font-size="13" font-family="Segoe UI">v2 paper texture + selected lift + unplayable desat  no page scroll</text>
</svg>
