<svg xmlns="http://www.w3.org/2000/svg" width="104" height="148" viewBox="0 0 104 148" role="img" aria-label="Dou Dizhu card front template v2">
  <defs>
    <linearGradient id="paperV2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffcf7"/>
      <stop offset="0.42" stop-color="#fbf8f0"/>
      <stop offset="1" stop-color="#f0ebe0"/>
    </linearGradient>
    <radialGradient id="paperSheen" cx="30%" cy="14%" r="72%">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".62"/>
      <stop offset=".55" stop-color="#ffffff" stop-opacity=".12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="suitRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d32f2f"/>
      <stop offset="1" stop-color="#b71c1c"/>
    </linearGradient>
    <pattern id="fiber" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.8" r="0.42" fill="#c4b296" opacity=".16"/>
      <circle cx="3.6" cy="4.1" r="0.32" fill="#b8a78c" opacity=".11"/>
      <path d="M0 2.5 H5" stroke="#d8ccb8" stroke-width=".25" opacity=".08"/>
    </pattern>
    <filter id="cardShadow" x="-28%" y="-22%" width="156%" height="156%">
      <feDropShadow dx="0" dy="4" stdDeviation="3.4" flood-color="#1a1008" flood-opacity=".30"/>
    </filter>
    <filter id="innerDepth" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blur"/>
      <feOffset dx="0" dy="1.5"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="inner"/>
      <feColorMatrix in="inner" type="matrix" values="0 0 0 0 0.45  0 0 0 0 0.35  0 0 0 0 0.22  0 0 0 0.22 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  <rect x="3.5" y="3.5" width="97" height="141" rx="10" fill="#e4dacb" filter="url(#cardShadow)"/>
  <rect x="4.5" y="4.5" width="95" height="139" rx="9.5" fill="url(#paperV2)" stroke="#8a7355" stroke-width="1.25" filter="url(#innerDepth)"/>
  <rect x="4.5" y="4.5" width="95" height="139" rx="9.5" fill="url(#paperSheen)"/>
  <rect x="4.5" y="4.5" width="95" height="139" rx="9.5" fill="url(#fiber)"/>
  <rect x="8" y="8" width="88" height="132" rx="7" fill="none" stroke="#d9cbb5" stroke-width="1" opacity=".92"/>
  <rect x="10" y="10" width="84" height="128" rx="6" fill="none" stroke="#efe6d6" stroke-width=".6" opacity=".55"/>
  <g fill="url(#suitRed)">
