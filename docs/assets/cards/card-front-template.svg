    <path d="M19.5 36.5 C13.5 29.5 6.5 39.5 13.5 48 C16.8 52.5 19.5 56 19.5 60.5 C19.5 56 22.2 52.5 25.5 48 C32.5 39.5 25.5 29.5 19.5 36.5Z"/>
    <path d="M52 48 C37 30 20 54 34 73 C42 83 49 91 52 106 C55 91 62 83 70 73 C84 54 67 30 52 48Z" opacity=".96"/>
    <ellipse cx="52" cy="78" rx="7" ry="5.5" fill="#ffffff" opacity=".14"/>
  </g>
  <g fill="url(#suitRed)" transform="rotate(180 52 74)">
    <text x="14" y="29" font-family="Georgia, 'Times New Roman', Times, serif" font-size="22" font-weight="800">A</text>
    <path d="M19.5 36.5 C13.5 29.5 6.5 39.5 13.5 48 C16.8 52.5 19.5 56 19.5 60.5 C19.5 56 22.2 52.5 25.5 48 C32.5 39.5 25.5 29.5 19.5 36.5Z"/>
