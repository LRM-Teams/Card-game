<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="104" height="148" viewBox="0 0 104 148" role="img" aria-label="Dou Dizhu card back">
  <defs>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3e0a8"/>
      <stop offset="0.5" stop-color="#d4b06a"/>
      <stop offset="1" stop-color="#a67c32"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b1e22"/>
      <stop offset="0.45" stop-color="#5a1218"/>
      <stop offset="1" stop-color="#241018"/>
    </linearGradient>
    <linearGradient id="medallion" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a1820"/>
      <stop offset="1" stop-color="#1a0c12"/>
    </linearGradient>
    <pattern id="lattice" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M0 7 L7 0 L14 7 L7 14 Z" fill="none" stroke="#e8c868" stroke-width=".9" opacity=".32"/>
      <circle cx="7" cy="7" r="1.1" fill="#e8c868" opacity=".25"/>
    </pattern>
    <filter id="shadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="3.5" flood-color="#2a1608" flood-opacity=".32"/>
    </filter>
  </defs>
  <rect x="3" y="3" width="98" height="142" rx="10" fill="url(#rim)" filter="url(#shadow)"/>
  <rect x="7" y="7" width="90" height="134" rx="8" fill="url(#field)"/>
  <rect x="12" y="12" width="80" height="124" rx="6" fill="url(#lattice)" stroke="#e8c868" stroke-width="1.75"/>
  <rect x="16" y="16" width="72" height="116" rx="4" fill="none" stroke="#f3e0a8" stroke-width=".6" opacity=".35"/>
  <!-- ornate diamond medallion (self-drawn, classic card-back) -->
  <circle cx="52" cy="74" r="26" fill="url(#medallion)" stroke="#e8c868" stroke-width="2.5"/>
  <circle cx="52" cy="74" r="21" fill="none" stroke="#f3e0a8" stroke-width=".8" opacity=".55"/>
  <g fill="none" stroke="#e8c868" stroke-width="1.8" stroke-linejoin="round">
    <path d="M52 54 L66 74 L52 94 L38 74 Z"/>
    <path d="M52 60 L60 74 L52 88 L44 74 Z" opacity=".85"/>
  </g>
  <circle cx="52" cy="74" r="4" fill="#e8c868"/>
  <circle cx="52" cy="74" r="2" fill="#3a1820"/>
</svg>
