<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="农民">
  <!-- LRM-167 定稿：弱于地主的身份角标，仅麦穗图标无文字；青绿静态度 -->
  <defs>
    <linearGradient id="fm-disk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a9a62"/>
      <stop offset="1" stop-color="#1a5c38"/>
    </linearGradient>
    <linearGradient id="fm-wheat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe29a"/>
      <stop offset="1" stop-color="#c4872f"/>
    </linearGradient>
  </defs>
  <circle cx="48" cy="48" r="42" fill="url(#fm-disk)" stroke="#9be0b6" stroke-width="2.5" opacity="0.88"/>
  <!-- stem -->
  <path d="M48 72 V34" stroke="#8a5a18" stroke-width="3" stroke-linecap="round"/>
  <!-- wheat heads -->
  <ellipse cx="48" cy="30" rx="7" ry="10" fill="url(#fm-wheat)" stroke="#7b4b17" stroke-width="1.2"/>
  <ellipse cx="38" cy="40" rx="6" ry="9" fill="url(#fm-wheat)" stroke="#7b4b17" stroke-width="1.2" transform="rotate(-28 38 40)"/>
  <ellipse cx="58" cy="40" rx="6" ry="9" fill="url(#fm-wheat)" stroke="#7b4b17" stroke-width="1.2" transform="rotate(28 58 40)"/>
  <ellipse cx="40" cy="52" rx="5.5" ry="8" fill="url(#fm-wheat)" stroke="#7b4b17" stroke-width="1.2" transform="rotate(-22 40 52)"/>
  <ellipse cx="56" cy="52" rx="5.5" ry="8" fill="url(#fm-wheat)" stroke="#7b4b17" stroke-width="1.2" transform="rotate(22 56 52)"/>
</svg>
