name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile --ignore-scripts

      - name: Test rules package
        run: pnpm --filter @card-game/rules test

      - name: Test server
        run: pnpm --filter @card-game/server test

      - name: Typecheck server
        run: pnpm --filter @card-game/server exec tsc --noEmit

      - name: Build client (same-origin)
        run: VITE_SERVER_URL="" pnpm --filter @card-game/client build

      - name: Start server and dual health check
        run: |
          set -euo pipefail
          CLIENT_DIST="$PWD/apps/client/dist"
          PORT=3099 CLIENT_DIST="$CLIENT_DIST" \
            pnpm --filter @card-game/server exec tsx src/index.ts &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" 2>/dev/null || true
            wait "$SERVER_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          for i in $(seq 1 60); do
            if curl -sf "http://127.0.0.1:3099/health" | grep -q '"ok":true'; then
              break
            fi
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "Server process exited before health was ready"
              exit 1
            fi
            sleep 1
          done

          curl -sf "http://127.0.0.1:3099/health" | grep -q '"ok":true'
          BODY=$(curl -sf "http://127.0.0.1:3099/")
          echo "$BODY" | grep -qiE 'root|index'
