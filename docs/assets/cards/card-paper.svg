<svg xmlns="http://www.w3.org/2000/svg" width="104" height="148" viewBox="0 0 104 148" role="img" aria-label="Dou Dizhu card paper v2">
  <defs>
    <linearGradient id="paperV2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffcf7"/>
      <stop offset="0.45" stop-color="#fbf8f0"/>
      <stop offset="1" stop-color="#f3eee3"/>
    </linearGradient>
    <radialGradient id="paperSheen" cx="32%" cy="18%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="fiber" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="2" r="0.45" fill="#c9b89a" opacity=".18"/>
      <circle cx="4" cy="5" r="0.35" fill="#b7a68a" opacity=".12"/>
    </pattern>
    <filter id="cardShadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="3.2" flood-color="#1a1008" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect x="3.5" y="3.5" width="97" height="141" rx="10" fill="#e8dfd0" filter="url(#cardShadow)"/>
  <rect x="4.5" y="4.5" width="95" height="139" rx="9.5" fill="url(#paperV2)" stroke="#8a7355" stroke-width="1.25"/>
  <rect x="4.5" y="4.5" width="95" height="139" rx="9.5" fill="url(#paperSheen)"/>
  <rect x="4.5" y="4.5" width="95" height="139" rx="9.5" fill="url(#fiber)"/>
  <rect x="8" y="8" width="88" height="132" rx="7" fill="none" stroke="#d9cbb5" stroke-width="1" opacity=".9"/>
</svg>
