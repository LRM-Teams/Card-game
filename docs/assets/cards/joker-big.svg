<svg xmlns="http://www.w3.org/2000/svg" width="104" height="148" viewBox="0 0 104 148" role="img" aria-label="Big Joker card">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffef9"/>
      <stop offset="0.55" stop-color="#f4ead4"/>
      <stop offset="1" stop-color="#e4d2a6"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#8b1018"/>
      <stop offset="0.45" stop-color="#d62828"/>
      <stop offset="1" stop-color="#ff8a3d"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#c49218"/>
      <stop offset="1" stop-color="#ffe08a"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="3.5" flood-color="#2a1608" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect x="3" y="3" width="98" height="142" rx="10" fill="url(#paper)" stroke="#c9a056" stroke-width="2" filter="url(#shadow)"/>
  <rect x="8" y="8" width="88" height="132" rx="7" fill="none" stroke="#fff8e8" stroke-width="1.5"/>
  <!-- labels -->
  <text x="13" y="26" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="800" fill="#b71c1c" letter-spacing="0.5">JOKER</text>
  <text x="14" y="44" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="900" fill="#b71c1c">大王</text>
  <!-- flame crown emblem (warm red-gold — distinct from small joker navy) -->
  <path d="M52 34 C68 52 80 64 76 92 C73 112 60 124 52 130 C44 124 31 112 28 92 C24 64 36 52 52 34Z" fill="url(#flame)"/>
  <path d="M52 58 C62 70 68 80 66 98 C64 110 57 118 52 124 C47 118 40 110 38 98 C36 80 42 70 52 58Z" fill="url(#core)"/>
  <!-- spark tips -->
  <path d="M40 48 L44 62 L36 58 Z" fill="#ffe08a" opacity=".9"/>
  <path d="M64 48 L60 62 L68 58 Z" fill="#ffe08a" opacity=".9"/>
  <path d="M52 28 L55 42 L49 42 Z" fill="#fff3c4"/>
  <!-- bottom label -->
  <text x="90" y="128" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="900" fill="#b71c1c" transform="rotate(180 90 128)">大王</text>
</svg>
