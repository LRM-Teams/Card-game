# 斗地主 · nginx 反代示例（单域名，覆盖现有 502 空反代）
# 部署形态：浏览器同源访问 80 → nginx 反代到本机 Node :3000（server 自托管 client dist + Socket.IO + /health）。
# Socket.IO 走 websocket，必须透传 Upgrade/Connection 头。

server {
    listen 80;
    server_name 82.157.184.89; # 换成你的域名/IP

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        # websocket 升级（Socket.IO 必须）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # 透传原始 Host 与来源
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 长连接超时（websocket 久连）
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
