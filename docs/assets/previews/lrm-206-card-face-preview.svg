<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-label="LRM-206 card face visual refinement preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2218"/>
      <stop offset="0.55" stop-color="#1b4a37"/>
      <stop offset="1" stop-color="#33221a"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".35"/></filter>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <text x="640" y="48" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="30" font-weight="900" fill="#fff5cf">LRM-206 Card Face Preview</text>
  <text x="640" y="76" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="15" fill="#f0d89a">Paper texture / clear suits / jokers distinct / selected &amp; unplayable states (self-drawn)</text>

  <g transform="translate(48 110)" filter="url(#s)">
    <rect width="1184" height="240" rx="22" fill="#14352a" stroke="#c9a056" stroke-width="2"/>
    <text x="28" y="38" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#fff4c4">Regular cards — four suits (Ace demos)</text>
    <image xlink:href="../cards/demo-ace-spade.svg" x="80" y="58" width="104" height="148"/>
    <image xlink:href="../cards/card-front-template.svg" x="220" y="58" width="104" height="148"/>
    <image xlink:href="../cards/demo-ace-club.svg" x="360" y="58" width="104" height="148"/>
    <image xlink:href="../cards/demo-ace-diamond.svg" x="500" y="58" width="104" height="148"/>
    <text x="132" y="224" text-anchor="middle" font-size="13" fill="#e8d9b0">Spade</text>
    <text x="272" y="224" text-anchor="middle" font-size="13" fill="#e8d9b0">Heart</text>
    <text x="412" y="224" text-anchor="middle" font-size="13" fill="#e8d9b0">Club</text>
    <text x="552" y="224" text-anchor="middle" font-size="13" fill="#e8d9b0">Diamond</text>
    <text x="720" y="100" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#f6e2b0">Colors</text>
    <text x="720" y="124" font-family="monospace" font-size="13" fill="#ffd0d0">Red #c62828</text>
    <text x="720" y="146" font-family="monospace" font-size="13" fill="#d0d6e0">Ink #1a1f2e</text>
    <text x="720" y="168" font-family="monospace" font-size="13" fill="#f3e0a8">Stroke #c9a056</text>
    <text x="720" y="190" font-family="monospace" font-size="13" fill="#fbf6ea">Paper #fffef9 -&gt; #e6d3a8</text>
    <text x="960" y="100" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#f6e2b0">Type scale @104x148</text>
    <text x="960" y="124" font-size="13" fill="#e8d9b0">Corner rank 22 / suit ~14</text>
    <text x="960" y="146" font-size="13" fill="#e8d9b0">Center suit ~48-56</text>
    <text x="960" y="168" font-size="13" fill="#e8d9b0">Radius rx=10 / inner rx=7</text>
    <text x="960" y="190" font-size="13" fill="#e8d9b0">Display 52x74 (@2x asset)</text>
  </g>

  <g transform="translate(48 372)" filter="url(#s)">
    <rect width="560" height="220" rx="22" fill="#14352a" stroke="#c9a056" stroke-width="2"/>
    <text x="28" y="36" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#fff4c4">Jokers — glanceable</text>
    <image xlink:href="../cards/joker-small.svg" x="70" y="52" width="104" height="148"/>
    <image xlink:href="../cards/joker-big.svg" x="220" y="52" width="104" height="148"/>
    <text x="122" y="210" text-anchor="middle" font-size="13" fill="#a8c4e0">Small — cool navy hat</text>
    <text x="272" y="210" text-anchor="middle" font-size="13" fill="#f0a0a0">Big — warm red flame</text>
    <text x="380" y="90" font-size="13" fill="#e8d9b0">Small ink #1a2f4a</text>
    <text x="380" y="112" font-size="13" fill="#e8d9b0">Big ink #b71c1c</text>
    <text x="380" y="134" font-size="13" fill="#e8d9b0">Dedicated SVG required</text>
  </g>

  <g transform="translate(640 372)" filter="url(#s)">
    <rect width="592" height="220" rx="22" fill="#14352a" stroke="#c9a056" stroke-width="2"/>
    <text x="28" y="36" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#fff4c4">Card back</text>
    <image xlink:href="../cards/card-back.svg" x="70" y="52" width="104" height="148"/>
    <image xlink:href="../cards/card-back.svg" x="160" y="68" width="80" height="114"/>
    <image xlink:href="../cards/card-back.svg" x="228" y="76" width="70" height="100"/>
    <text x="380" y="90" font-size="13" fill="#e8d9b0">Burgundy + gold lattice</text>
    <text x="380" y="112" font-size="13" fill="#e8d9b0">Self-drawn clover seal</text>
    <text x="380" y="134" font-size="13" fill="#e8d9b0">Opponent thumb 40x56</text>
    <text x="380" y="156" font-size="13" fill="#e8d9b0">Rim #c9a056 / #e8c868</text>
  </g>

  <g transform="translate(48 616)" filter="url(#s)">
    <rect width="1184" height="210" rx="22" fill="#14352a" stroke="#c9a056" stroke-width="2"/>
    <text x="28" y="36" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#fff4c4">States — normal / selected / unplayable</text>

    <g transform="translate(90 58)">
      <image xlink:href="../cards/card-front-template.svg" width="104" height="148"/>
      <text x="52" y="168" text-anchor="middle" font-size="13" fill="#e8d9b0">Normal</text>
    </g>

    <g transform="translate(280 42)">
      <rect x="-4" y="-4" width="112" height="156" rx="12" fill="none" stroke="#e8bc3a" stroke-width="3"/>
      <image xlink:href="../cards/card-front-template.svg" width="104" height="148"/>
      <text x="52" y="184" text-anchor="middle" font-size="13" fill="#e8bc3a">Selected — lift + gold stroke</text>
    </g>

    <g transform="translate(500 58)" opacity="0.55">
      <image xlink:href="../cards/card-front-template.svg" width="104" height="148"/>
      <rect width="104" height="148" rx="10" fill="#6a6a6a" opacity=".28"/>
    </g>
    <text x="552" y="226" text-anchor="middle" font-size="13" fill="#c8c8c8">Unplayable — sat 55% / alpha 0.55</text>

    <text x="720" y="80" font-size="14" fill="#f6e2b0">Client measurable rules</text>
    <text x="720" y="106" font-size="13" fill="#e8d9b0">Selected: translateY(-10~-34px) + border #e8bc3a + glow</text>
    <text x="720" y="128" font-size="13" fill="#e8d9b0">Unplayable: .is-unplayable saturate(0.55) opacity 0.55</text>
    <text x="720" y="150" font-size="13" fill="#e8d9b0">Radius --ddz-radius-card 8px (display) / asset rx~10@104</text>
    <text x="720" y="172" font-size="13" fill="#e8d9b0">Shadow --ddz-shadow-card; selected adds lift shadow</text>
  </g>
</svg>
