<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="LRM-246 viewport fit before after">
  <rect width="1280" height="720" fill="#241612"/>
  <text x="40" y="36" fill="#e8bc3a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">LRM-246 Viewport Fit  1920x1080 play state</text>
  <text x="40" y="60" fill="#fff3c4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" opacity="0.75">Before: tall oval + loose gaps (page scroll). After: 100dvh shell + flatter oval + zone budgets.</text>

  <!-- BEFORE frame -->
  <g transform="translate(40,84)">
    <text x="0" y="0" fill="#ff8e8e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">BEFORE (overflow)</text>
    <rect x="0" y="12" width="560" height="560" rx="8" fill="#33221a" stroke="rgba(255,255,255,0.14)"/>
    <!-- viewport clip hint -->
    <rect x="0" y="12" width="560" height="420" fill="none" stroke="#ff8e8e" stroke-dasharray="6 4" stroke-width="2"/>
    <text x="8" y="34" fill="#fff3c4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">topnav 52</text>
    <rect x="16" y="42" width="528" height="36" rx="4" fill="#0b2218"/>
    <ellipse cx="280" cy="250" rx="240" ry="170" fill="#1b4a37" stroke="#8a5a2b" stroke-width="10"/>
    <text x="200" y="200" fill="#fff3c4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" opacity="0.8">oval 34% + pad 40</text>
    <text x="210" y="220" fill="#fff3c4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" opacity="0.8">stage min ~280</text>
    <rect x="80" y="400" width="400" height="70" rx="6" fill="#2a6349" opacity="0.85"/>
    <text x="220" y="440" fill="#fff3c4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">hand 188</text>
    <rect x="100" y="490" width="360" height="56" rx="8" fill="#c49218"/>
    <text x="210" y="524" fill="#2c1d00" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700">controls (clipped)</text>
    <text x="160" y="560" fill="#ff8e8e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">scrollbar / must scroll to see CTA</text>
  </g>

  <!-- AFTER frame -->
  <g transform="translate(680,84)">
    <text x="0" y="0" fill="#7ef0a8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">AFTER (one screen)</text>
    <rect x="0" y="12" width="560" height="560" rx="8" fill="#33221a" stroke="rgba(255,255,255,0.14)"/>
    <rect x="0" y="12" width="560" height="560" fill="none" stroke="#7ef0a8" stroke-width="2"/>
    <text x="8" y="34" fill="#fff3c4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">topnav &lt;=44  |  foot hidden</text>
    <rect x="16" y="42" width="528" height="32" rx="4" fill="#0b2218"/>
    <ellipse cx="280" cy="230" rx="240" ry="130" fill="#1b4a37" stroke="#8a5a2b" stroke-width="10"/>
    <text x="175" y="200" fill="#fff3c4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" opacity="0.85">oval 28% + pad 18</text>
    <text x="190" y="218" fill="#fff3c4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" opacity="0.85">stage 140-220</text>
    <rect x="80" y="360" width="400" height="56" rx="6" fill="#2a6349" opacity="0.9"/>
    <text x="210" y="394" fill="#fff3c4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">hand &gt;=132</text>
    <rect x="100" y="436" width="360" height="48" rx="8" fill="#e8bc3a"/>
    <text x="200" y="466" fill="#2c1d00" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700">controls &lt;=96 (visible)</text>
    <text x="120" y="520" fill="#7ef0a8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">100dvh shell  no page vertical scroll</text>
    <text x="90" y="545" fill="#fff3c4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" opacity="0.7">tokens: --ddz-vp-* in styles.css + design-tokens ?11</text>
  </g>
</svg>
