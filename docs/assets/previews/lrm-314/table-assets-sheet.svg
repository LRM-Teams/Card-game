<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="LRM-314 table assets play state preview">
  <defs>
    <linearGradient id="roomV1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#33221a"/>
      <stop offset="48%" stop-color="#43301f"/>
      <stop offset="100%" stop-color="#241612"/>
    </linearGradient>
    <radialGradient id="feltV1" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#2a6349"/>
      <stop offset="42%" stop-color="#1f5540"/>
      <stop offset="68%" stop-color="#1b4a37"/>
      <stop offset="100%" stop-color="#0b2218"/>
    </radialGradient>
    <pattern id="feltTex" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#1b4a37"/>
      <path d="M0 32h64M32 0v64" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      <circle cx="16" cy="16" r="0.8" fill="rgba(0,0,0,0.1)"/>
    </pattern>
    <pattern id="woodTex" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#6b4424"/>
      <path d="M4 0 Q6 10 4 20 T4 32" stroke="rgba(0,0,0,0.15)" stroke-width="0.6" fill="none"/>
      <rect y="0" width="32" height="2" fill="rgba(255,243,196,0.12)"/>
    </pattern>
    <filter id="roomGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#120a08"/>
  <text x="48" y="52" fill="#e8bc3a" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">LRM-314 Table Assets v2  Play State 1920x1080</text>
  <text x="48" y="86" fill="#fff3c4" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14" opacity="0.8">v1 flat CSS (left) vs v2 felt/rail/room-bg SVG (right)  LRM-246/250 viewport preserved</text>

  <!-- V1 LEFT -->
  <g transform="translate(48,110)">
    <text x="0" y="0" fill="#ff9e9e" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700">v1  CSS only (baseline)</text>
    <rect x="0" y="16" width="880" height="880" rx="10" fill="url(#roomV1)" stroke="rgba(255,255,255,0.12)"/>
    <!-- topnav -->
    <rect x="20" y="36" width="840" height="40" rx="6" fill="rgba(11,34,24,0.85)"/>
    <text x="36" y="62" fill="#fff3c4" font-size="13" font-family="Segoe UI, sans-serif">topnav 44px</text>
    <!-- flat table -->
    <ellipse cx="440" cy="420" rx="360" ry="200" fill="url(#feltV1)" stroke="#6b4424" stroke-width="18"/>
    <ellipse cx="440" cy="420" rx="348" ry="188" fill="none" stroke="#8a5c34" stroke-width="3"/>
  <!-- opponents -->
    <rect x="360" y="200" width="160" height="56" rx="8" fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.1)"/>
    <text x="400" y="234" fill="#fff3c4" font-size="12" font-family="Segoe UI">opponent</text>
    <!-- stage -->
    <rect x="300" y="360" width="280" height="100" rx="10" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.08)"/>
    <text x="380" y="418" fill="#fff3c4" font-size="12" font-family="Segoe UI">stage 140-220</text>
    <!-- hand -->
    <g transform="translate(220,640)">
      <rect x="0" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="28" y="-6" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="56" y="-12" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#e8bc3a" stroke-width="2"/>
      <rect x="84" y="-6" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="112" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="140" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="168" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="196" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="224" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="252" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="280" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="308" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="336" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
    </g>
    <text x="360" y="760" fill="#fff3c4" font-size="11" font-family="Segoe UI">hand docked (LRM-250)</text>
    <!-- controls -->
    <rect x="240" y="790" width="400" height="48" rx="10" fill="#e8bc3a"/>
    <text x="380" y="820" fill="#2c1d00" font-size="13" font-weight="700" font-family="Segoe UI" text-anchor="middle">úL CTA</text>
    <text x="20" y="870" fill="#ff9e9e" font-size="12" font-family="Segoe UI">flat gradient, no weave</text>
  </g>

  <!-- V2 RIGHT -->
  <g transform="translate(992,110)">
    <text x="0" y="0" fill="#7ef0a8" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700">v2  production assets</text>
    <rect x="0" y="16" width="880" height="880" rx="10" fill="url(#roomV1)" stroke="rgba(126,240,168,0.5)"/>
    <!-- room bg overlay -->
    <rect x="0" y="16" width="880" height="880" rx="10" fill="url(#roomV1)" opacity="0.9"/>
    <ellipse cx="440" cy="80" rx="200" ry="60" fill="rgba(255,200,120,0.08)" filter="url(#roomGlow)"/>
    <rect x="0" y="16" width="880" height="880" rx="10" fill="rgba(0,0,0,0.25)"/>
    <!-- topnav -->
    <rect x="20" y="36" width="840" height="40" rx="6" fill="rgba(11,34,24,0.85)"/>
    <text x="36" y="62" fill="#fff3c4" font-size="13" font-family="Segoe UI, sans-serif">topnav 44px</text>
    <!-- textured table -->
    <ellipse cx="440" cy="420" rx="360" ry="200" fill="url(#feltTex)" stroke="url(#woodTex)" stroke-width="18"/>
    <ellipse cx="440" cy="420" rx="360" ry="200" fill="url(#feltV1)" opacity="0.72"/>
    <ellipse cx="440" cy="420" rx="348" ry="188" fill="none" stroke="#8a5c34" stroke-width="3"/>
    <ellipse cx="440" cy="360" rx="200" ry="80" fill="rgba(168,198,178,0.08)"/>
    <!-- opponents -->
    <rect x="360" y="200" width="160" height="56" rx="8" fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.1)"/>
    <text x="400" y="234" fill="#fff3c4" font-size="12" font-family="Segoe UI">opponent</text>
    <!-- stage -->
    <rect x="300" y="360" width="280" height="100" rx="10" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.08)"/>
    <text x="380" y="418" fill="#fff3c4" font-size="12" font-family="Segoe UI">stage 140-220</text>
    <!-- hand -->
    <g transform="translate(220,640)">
      <rect x="0" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="28" y="-6" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="56" y="-12" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#e8bc3a" stroke-width="2"/>
      <rect x="84" y="-6" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="112" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="140" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="168" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="196" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="224" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="252" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="280" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="308" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
      <rect x="336" y="0" width="52" height="74" rx="6" fill="#fbfbf6" stroke="#8a7355"/>
    </g>
    <text x="360" y="760" fill="#fff3c4" font-size="11" font-family="Segoe UI">hand docked (LRM-250)</text>
    <!-- controls -->
    <rect x="240" y="790" width="400" height="48" rx="10" fill="#e8bc3a"/>
    <text x="380" y="820" fill="#2c1d00" font-size="13" font-weight="700" font-family="Segoe UI" text-anchor="middle">úL CTA</text>
    <text x="20" y="870" fill="#7ef0a8" font-size="12" font-family="Segoe UI">felt-texture + rail-strip + room-bg</text>
  </g>

  <!-- token map legend -->
  <g transform="translate(48,1010)">
    <text x="0" y="0" fill="#fff3c4" font-size="13" font-family="Segoe UI, sans-serif" opacity="0.85">Assets: docs/assets/table/ | public/table/ | integration-spec.md | design-tokens §13</text>
    <text x="0" y="22" fill="#fff3c4" font-size="12" font-family="Segoe UI, sans-serif" opacity="0.65">--ddz-felt-700/600/mid/900 ’ felt-texture.svg | --ddz-rail-wood-* ’ rail-strip.svg + box-shadow | --ddz-room-* ’ room-bg.svg</text>
  </g>
</svg>
