<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img">
  <rect width="960" height="420" fill="#241612"/>
  <text x="24" y="32" fill="#e8bc3a" font-family="Arial, sans-serif" font-size="18" font-weight="700">LRM-250 hand dock lower</text>
  <text x="24" y="54" fill="#fff3c4" font-family="Arial, sans-serif" font-size="12" opacity="0.75">Before: floating hand + empty green under cards. After: margin-top auto + controls -8px.</text>
  <g transform="translate(24,80)">
    <text x="0" y="0" fill="#ff8e8e" font-family="Arial, sans-serif" font-size="14" font-weight="700">BEFORE</text>
    <rect x="0" y="10" width="420" height="300" rx="8" fill="#1b4a37"/>
    <rect x="40" y="70" width="340" height="50" rx="4" fill="#fbf8f0"/>
    <text x="150" y="100" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="12">hand (high)</text>
    <rect x="120" y="160" width="180" height="22" rx="11" fill="#0b2218"/>
    <text x="165" y="175" fill="#e8bc3a" font-family="Arial, sans-serif" font-size="10">hint</text>
    <rect x="80" y="200" width="260" height="40" rx="6" fill="#e8bc3a"/>
    <text x="160" y="225" fill="#2c1d00" font-family="Arial, sans-serif" font-size="12" font-weight="700">controls</text>
    <text x="90" y="280" fill="#7ef0a8" font-family="Arial, sans-serif" font-size="11" opacity="0.7">empty green under hand</text>
  </g>
  <g transform="translate(500,80)">
    <text x="0" y="0" fill="#7ef0a8" font-family="Arial, sans-serif" font-size="14" font-weight="700">AFTER</text>
    <rect x="0" y="10" width="420" height="300" rx="8" fill="#1b4a37"/>
    <rect x="40" y="150" width="340" height="50" rx="4" fill="#fbf8f0"/>
    <text x="145" y="180" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="12">hand (lower)</text>
    <rect x="120" y="210" width="180" height="20" rx="10" fill="#0b2218"/>
    <text x="165" y="224" fill="#e8bc3a" font-family="Arial, sans-serif" font-size="10">hint</text>
    <rect x="80" y="240" width="260" height="40" rx="6" fill="#e8bc3a"/>
    <text x="150" y="265" fill="#2c1d00" font-family="Arial, sans-serif" font-size="12" font-weight="700">controls docked</text>
    <text x="70" y="300" fill="#7ef0a8" font-family="Arial, sans-serif" font-size="11">tight gap / less bottom green</text>
  </g>
</svg>
